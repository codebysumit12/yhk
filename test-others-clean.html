<!DOCTYPE html>
<html>
<head>
    <title>Test OthersPage</title>
</head>
<body>
    <h1>Testing OthersPage API</h1>
    
    <h2>Test 1: Add Item (without category)</h2>
    <button onclick="testAddItem()">Add Test Item</button>
    
    <h2>Test 2: Get Drinks</h2>
    <button onclick="testGetDrinks()">Get Drinks</button>
    
    <div id="results"></div>
    
    <script>
        const API_URL = 'http://localhost:5001';
        const token = 'test';
        
        async function testAddItem() {
            const formData = new FormData();
            formData.append('name', 'Test Drink');
            formData.append('type', 'drinks');
            formData.append('categoryId', '');
            formData.append('price', '99');
            formData.append('isAvailable', 'true');
            
            try {
                const response = await fetch(API_URL + '/api/items', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                
                const data = await response.json();
                document.getElementById('results').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('results').innerHTML = 'Error: ' + error.message;
            }
        }
        
        async function testGetDrinks() {
            try {
                const response = await fetch(API_URL + '/api/items?type=drinks');
                const data = await response.json();
                document.getElementById('results').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('results').innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
