<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to Cart Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-btn { 
            background: #22c55e; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px; 
        }
        .test-btn:hover { background: #16a34a; }
        .log { 
            background: #f5f5f5; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 4px; 
            font-family: monospace; 
        }
    </style>
</head>
<body>
    <h1>Add to Cart Test</h1>
    
    <h2>Test 1: Basic Click Event</h2>
    <button class="test-btn" onclick="testBasicClick()">Test Basic Click</button>
    
    <h2>Test 2: Add to Cart Simulation</h2>
    <button class="test-btn" onclick="testAddToCart()">Add Test Item to Cart</button>
    
    <h2>Console Log:</h2>
    <div id="log" class="log">Click the buttons to see logs...</div>

    <script>
        // Override console.log to show on page
        const originalLog = console.log;
        const logDiv = document.getElementById('log');
        
        function addToLog(message) {
            const div = document.createElement('div');
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToLog(args.join(' '));
        };
        
        function testBasicClick() {
            console.log('🔘 Basic button clicked successfully!');
            alert('Basic click works!');
        }
        
        function testAddToCart() {
            const testItem = {
                name: 'Test Item',
                price: 99,
                discountPrice: 79,
                emoji: '🍽️'
            };
            
            console.log('🛒 Add to Cart test clicked:', testItem);
            
            // Simulate cart addition
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const newCart = [...cart, { ...testItem, cartId: Date.now(), finalPrice: 79, quantity: 1 }];
            
            localStorage.setItem('cart', JSON.stringify(newCart));
            console.log('🛒 Cart updated:', newCart);
            console.log('✅ Test item added to cart successfully!');
            
            alert(`Added ${testItem.name} to cart! Total items: ${newCart.length}`);
        }
        
        // Test page load
        console.log('📄 Add to Cart test page loaded successfully');
    </script>
</body>
</html>
