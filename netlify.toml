# Fresh Deployment Configuration - v2.0.0
[build]
  base = "project-root/frontend"
  command = "npm ci --force && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"
  CI = "false"

# Production environment variables
[context.production.environment]
  REACT_APP_API_URL = "/api"
  REACT_APP_USER_API_URL = "/api"
  REACT_APP_BUILD_VERSION = "2.0.0"

# Development environment variables
[context.deploy-preview.environment]
  REACT_APP_API_URL = "/api"
  REACT_APP_USER_API_URL = "/api"

# Branch deployment environment
[context.branch-deploy.environment]
  REACT_APP_API_URL = "/api"
  REACT_APP_USER_API_URL = "/api"

# Headers for cache control and CSP
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Content-Security-Policy = "frame-ancestors 'self' https://accounts.google.com https://*.google.com;"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Edge functions (if needed)
[[edge_functions]]
  path = "/api/*"
  function = "api"

# Plugin configurations
[[plugins]]
  package = "@netlify/plugin-lighthouse"

[[plugins]]
  package = "netlify-plugin-submit-sitemap"
