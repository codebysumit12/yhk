<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Phone Input</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .input-group { margin: 20px 0; }
        input { padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Debug Phone Input</h1>
    
    <div class="input-group">
        <label>Phone Number Input Test:</label>
        <input type="tel" id="phoneInput" placeholder="Enter 10-digit number" maxlength="10">
        <button onclick="testPhoneInput()">Test Input</button>
    </div>
    
    <div id="result"></div>
    
    <div class="input-group">
        <label>Console Log:</label>
        <div id="console" style="background: #f5f5f5; padding: 10px; height: 200px; overflow-y: auto;"></div>
    </div>

    <script>
        // Override console.log to display on page
        const originalLog = console.log;
        const originalError = console.error;
        const consoleDiv = document.getElementById('console');
        
        function addToConsole(message, type = 'log') {
            const div = document.createElement('div');
            div.style.color = type === 'error' ? 'red' : 'black';
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            consoleDiv.appendChild(div);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };

        // Test phone input functionality
        function testPhoneInput() {
            const phoneInput = document.getElementById('phoneInput');
            const result = document.getElementById('result');
            
            console.log('Testing phone input...');
            console.log('Input value:', phoneInput.value);
            console.log('Input type:', phoneInput.type);
            console.log('Input maxlength:', phoneInput.maxLength);
            
            // Test the same validation as in Checkoutpage.jsx
            const phoneNumber = phoneInput.value.replace(/\D/g, '');
            console.log('After removing non-digits:', phoneNumber);
            
            if (!/^\d{10}$/.test(phoneNumber)) {
                result.innerHTML = '<div class="error">Please enter a valid 10-digit mobile number.</div>';
                console.log('Validation failed: not 10 digits');
            } else {
                result.innerHTML = '<div class="success">Phone number is valid: ' + phoneNumber + '</div>';
                console.log('Validation passed');
            }
        }

        // Test input event handling
        document.getElementById('phoneInput').addEventListener('input', function(e) {
            console.log('Input event fired. Value:', e.target.value);
            // Test the same logic as in Checkoutpage.jsx
            const cleanedValue = e.target.value.replace(/\D/g, '');
            console.log('Cleaned value:', cleanedValue);
        });

        // Test focus events
        document.getElementById('phoneInput').addEventListener('focus', function(e) {
            console.log('Focus event fired');
        });

        document.getElementById('phoneInput').addEventListener('blur', function(e) {
            console.log('Blur event fired. Final value:', e.target.value);
        });

        console.log('Debug page loaded');
    </script>
</body>
</html>
